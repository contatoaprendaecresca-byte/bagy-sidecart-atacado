<!--
  Exemplo de aplicação do Bagy SideCart Atacado COM configuração.

  Cole no campo de Scripts da Bagy (Rodapé · Essencial · Tipo: Script).
  O bloco de configuração é OPCIONAL — sem ele, o carrinho já funciona e
  o pedido mínimo vem da plataforma (cartInfo.min_purchase).

  Ordem: CSS → (config) → BASE → OVERRIDE.
-->

<!-- 3. CSS do SideCart (depois do CSS do tema) -->
<link rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/contatoaprendaecresca-byte/bagy-sidecart-atacado@1.2.0/dist/aec-sidecart.min.css">

<!-- (Opcional) Aviso na página de produto -->
<style>
  :root {
    --aec-product-notice: "Site Atacado • Pedido mínimo de R$ 400,00";
    --aec-product-notice-mobile: "Atacado • Pedido mínimo R$ 400,00";
  }
</style>

<!-- (Opcional) Configuração de textos/valores — ANTES dos scripts -->
<script>
  window.SIDECART_ATACADO = {
    // null = usa o pedido mínimo definido no admin da loja (recomendado).
    // Troque por um número (ex.: 400) para forçar um valor fixo.
    minPurchase: null,
    messages: {
      minLabel: 'Pedido mínimo atacado:',
      minMissing: 'Adicione mais {value} para finalizar seu pedido.',
      minReached: 'Pedido mínimo atingido. Você já pode finalizar! ✓'
    }
  };
</script>

<!-- 4. BASE do SideCart -->
<script src="https://cdn.jsdelivr.net/gh/contatoaprendaecresca-byte/bagy-sidecart-atacado@1.2.0/dist/aec-sidecart-base.min.js"
        charset="utf-8"></script>

<!-- 5. OVERRIDE do SideCart (depois da base) -->
<script src="https://cdn.jsdelivr.net/gh/contatoaprendaecresca-byte/bagy-sidecart-atacado@1.2.0/dist/aec-sidecart-override.min.js"
        charset="utf-8"></script>
