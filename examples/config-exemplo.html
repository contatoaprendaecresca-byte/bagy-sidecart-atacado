<!--
  Exemplo de aplicação do Bagy SideCart Atacado no tema de uma loja.

  Cole no rodapé do tema (Bagy → Loja → Tema → Editar código).
  O bloco de configuração é OPCIONAL — sem ele, o carrinho já funciona e
  o pedido mínimo vem da plataforma (cartInfo.min_purchase).

  Substitua <org> pela organização/usuário do GitHub onde o repositório está publicado.
-->

<!-- 3. CSS do SideCart (depois do CSS do tema) -->
<link rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/<org>/bagy-sidecart-atacado@1.0.0/dist/aec-sidecart.min.css">

<!-- (Opcional) Aviso na página de produto -->
<style>
  :root {
    --aec-product-notice: "Site Atacado • Pedido mínimo de R$ 400,00";
    --aec-product-notice-mobile: "Atacado • Pedido mínimo R$ 400,00";
  }
</style>

<!-- (Opcional) Configuração de textos/valores -->
<script>
  window.SIDECART_ATACADO = {
    // null = usa o pedido mínimo definido no admin da loja (recomendado).
    // Troque por um número (ex.: 400) para forçar um valor fixo.
    minPurchase: null,
    messages: {
      minLabel: 'Pedido mínimo atacado:',
      minMissing: 'Adicione mais {value} para finalizar seu pedido.',
      minReached: 'Pedido mínimo atingido. Você já pode finalizar! ✓'
    }
  };
</script>

<!-- 4. JS do SideCart (por último) -->
<script src="https://cdn.jsdelivr.net/gh/<org>/bagy-sidecart-atacado@1.0.0/dist/aec-sidecart.min.js"
        charset="utf-8"></script>
